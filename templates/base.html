<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}AnemiaCare{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
    {% block head %}{% endblock %}
  </head>
  <body>
    <header class="topbar">
      <div class="container topbar__inner">
        <a class="brand" href="{{ url_for('home') }}">
          <span class="brand__mark" aria-hidden="true">
            <svg viewBox="0 0 48 48" width="28" height="28" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M6 26h10l5-12 6 20 4-8h11" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </span>
          <span class="brand__name">AnemiaCare</span>
        </a>

        <nav class="nav" aria-label="Primary">
          <a class="nav__link{% if active_page == 'diagnosis' %} nav__link--active{% endif %}" href="{{ url_for('home') }}">Diagnosis</a>
          <a class="nav__link{% if active_page == 'about' %} nav__link--active{% endif %}" href="{{ url_for('about') }}">About</a>
          <div class="nav__actions">
            <a class="btn btn--ghost" href="{{ url_for('login') }}">Login</a>
            <a class="btn btn--primary" href="{{ url_for('register') }}">Register</a>
          </div>
        </nav>
      </div>
    </header>

    <main>
      {% block content %}{% endblock %}
    </main>

    <button class="help" type="button" aria-label="Help">?</button>
    {% block scripts %}{% endblock %}
  </body>
</html>
